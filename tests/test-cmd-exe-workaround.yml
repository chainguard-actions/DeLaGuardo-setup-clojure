name: Test cmd-exe-workaround input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          cmd-exe-workaround: 'latest'
          github-token: ${{ github.token }}
      - name: Assert action completed
        run: |
          echo "Action completed with cmd-exe-workaround input"
          echo "PASS"
